<!DOCTYPE html>
<html lang="fa" dir="rtl">
{% load static %}
<head>
    <title>Online Shop | Basket</title>
    {% include 'partial/header.html' %}
</head>
<body>

{% include 'partial/nav.html' %}

<h1 class="text-center p-5">ثبت نام و تکمیل سفارش</h1>

<div class="container">
    <div class="row">
        <div class="col-xs-12 col-sm-2"></div>
        <div class="col-xs-12 col-sm-8">
            <div class="alert alert-primary" role="alert">
                درصورتی که حساب کاربری دارید ابتدا
                <a href="/admin/">وارد</a>
                حساب کاربری خود شوید
            </div>
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">نام</label>
                            <input type="text" class="form-control" name="first_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">نام خانوادگی</label>
                            <input type="text" class="form-control" name="last_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">شماره موبایل</label>
                            <input type="text" class="form-control" name="mobile" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">رمز عبور</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">آدرس</label>
                            <input type="text" class="form-control" name="address" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">کد پستی</label>
                            <input type="text" class="form-control" name="postal_code" required>
                        </div>
                        <button type="submit" class="btn btn-success">ثبت‌نام و تکمیل سفارش</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-xs-12 col-sm-2"></div>
    </div>
</div>

{% include 'partial/footer.html' %}

</body>
</html>
