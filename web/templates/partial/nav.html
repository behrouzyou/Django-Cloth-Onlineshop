{% load static %}
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="{% static 'images/logo.png' %}" width="60"/>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                {% for nav in navigations %}
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="{{nav.link}}">{{nav.title}}</a>
                </li>
                {% endfor %}
            </ul>
            <form class="d-flex" role="search">
                <a href="/admin/" class="btn btn-outline-success me-2">
                    <i class="fa-solid fa-user"></i>
                </a>
                <a href="/basket/" class="btn btn-outline-primary me-2">
                    <i class="fa-solid fa-basket-shopping"></i>
                </a>
                <input class="form-control me-2" type="search" placeholder="جستجو" aria-label="Search">
                <button class="btn btn-outline-success" type="submit">جستجو</button>
            </form>
        </div>
    </div>
</nav>


{% if messages %}
<div class="container">
    <div class="text-center p-3">
        {% for msg in messages %}
        <div class="alert {% if msg.tags %}alert-{{msg.tags}}{% endif %} alert-dismissible fade show" role="alert">
            {{msg}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
